<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>midi → tab</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0a0a0a;
  --surface: #111111;
  --border:  #222222;
  --dim:     #333333;
  --mid:     #555555;
  --sub:     #888888;
  --fg:      #ffffff;
  --green:   #7dcea0;
  --r:       10px;
}

html, body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.wrap {
  max-width: 900px;
  margin: 0 auto;
  padding: 3.5rem 2rem 8rem;
}

/* ── WORDMARK ── */
.wordmark {
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  color: var(--mid);
  margin-bottom: 3rem;
}

/* ── DROP ZONE ── */
.drop {
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 3.5rem 2rem;
  text-align: center;
  cursor: pointer;
  position: relative;
  transition: border-color 0.18s, background 0.18s;
}
.drop input {
  position: absolute; inset: 0;
  opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.drop:hover, .drop.over { border-color: var(--dim); background: #0f0f0f; }
.drop.loaded { padding: 1.25rem 1.5rem; text-align: left; cursor: default; }
.drop.loaded input { pointer-events: none; }

.drop-hint { font-size: 0.78rem; color: var(--sub); letter-spacing: 0.03em; }
.drop-hint strong { display: block; font-size: 1rem; font-weight: 400; color: var(--fg); margin-bottom: 0.3rem; }

/* ── TRACK PILLS ── */
.pills {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-top: 0.75rem;
}
.pill {
  background: var(--surface);
  border: 1px solid var(--dim);
  border-radius: 6px;
  padding: 0.28rem 0.75rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  font-weight: 400;
  color: var(--fg);
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
  line-height: 1;
}
.pill:hover { border-color: #555; }
.pill.active {
  background: var(--fg);
  border-color: var(--fg);
  color: var(--bg);
}

/* ── META ROW ── */
.meta {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  margin-top: 0.75rem;
}
.tag {
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.2rem 0.55rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--sub);
  line-height: 1;
}
.tag.hi { color: var(--green); border-color: #1e3328; background: #0c1a12; }

/* ── DIVIDER ── */
.div { height: 1px; background: var(--border); margin: 1.75rem 0; }

/* ── PLAYER CONTROLS ── */
.controls {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1rem;
  flex-wrap: wrap;
}
.play-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1px solid var(--dim);
  background: transparent;
  color: var(--fg);
  cursor: pointer;
  display: grid;
  place-items: center;
  font-size: 0.65rem;
  transition: border-color 0.12s, background 0.12s;
  flex-shrink: 0;
}
.play-btn:hover { border-color: var(--sub); background: var(--surface); }
.play-btn.playing { background: var(--fg); color: var(--bg); border-color: var(--fg); }

.progress-track {
  flex: 1;
  min-width: 120px;
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  position: relative;
  cursor: pointer;
}
.progress-fill {
  height: 100%;
  background: var(--fg);
  border-radius: 1px;
  width: 0%;
  pointer-events: none;
  transition: none;
}
.progress-thumb {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--fg);
  left: 0%;
  pointer-events: none;
}

.time-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--sub);
  min-width: 80px;
  text-align: right;
  white-space: nowrap;
}

.tempo-ctrl {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.tempo-ctrl label {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--mid);
}
.tempo-ctrl input[type=range] {
  -webkit-appearance: none;
  width: 80px; height: 2px;
  background: var(--border);
  border-radius: 1px;
  outline: none;
  cursor: pointer;
}
.tempo-ctrl input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--fg);
}
.tempo-val {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--sub);
  min-width: 30px;
}

/* ── TAB VIEW ── */
.tab-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.75rem;
  gap: 1rem;
}
.tab-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--mid);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.copy-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.22rem 0.65rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--sub);
  cursor: pointer;
  transition: all 0.12s;
  letter-spacing: 0.06em;
}
.copy-btn:hover { border-color: var(--dim); color: var(--fg); }
.copy-btn.ok { border-color: var(--green); color: var(--green); }

/* ── TAB CANVAS ── */
.tab-canvas-wrap {
  position: relative;
  overflow: hidden;
  border-radius: var(--r);
  border: 1px solid var(--border);
  background: #080808;
  cursor: pointer;
  user-select: none;
}
canvas#tabCanvas { display: block; }

/* ── BAR NAV ── */
.bar-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 0.75rem;
}
.bar-btns { display: flex; gap: 0.4rem; }
.bar-btn {
  border: 1px solid var(--border);
  background: none;
  border-radius: 6px;
  padding: 0.25rem 0.65rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--sub);
  cursor: pointer;
  transition: all 0.12s;
  letter-spacing: 0.04em;
}
.bar-btn:hover { border-color: var(--dim); color: var(--fg); }
.bar-info {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--mid);
}

.hidden { display: none !important; }
@keyframes up { from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);} }
.fade { animation: up 0.22s ease forwards; }
</style>
</head>
<body>
<div class="wrap">

  <div class="wordmark">midi → tab</div>

  <!-- DROP -->
  <div class="drop" id="drop">
    <input type="file" accept=".mid,.midi" id="fileIn">
    <div class="drop-hint">
      <strong>drop midi file</strong>
      .mid · .midi
    </div>
  </div>

  <!-- RESULT -->
  <div id="result" class="hidden">

    <div class="div"></div>

    <!-- META + TRACKS -->
    <div class="meta" id="metaRow"></div>
    <div class="pills" id="pillsRow"></div>

    <div class="div"></div>

    <!-- CONTROLS -->
    <div class="controls">
      <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
      <div class="progress-track" id="progTrack">
        <div class="progress-fill" id="progFill"></div>
        <div class="progress-thumb" id="progThumb"></div>
      </div>
      <span class="time-label" id="timeLabel">0:00 / 0:00</span>
      <div class="tempo-ctrl">
        <label>speed</label>
        <input type="range" id="tempoSlider" min="25" max="200" value="100"
          oninput="onTempoChange(this.value)">
        <span class="tempo-val" id="tempoVal">1×</span>
      </div>
    </div>

    <!-- TAB -->
    <div class="tab-header">
      <span class="tab-label">guitar tab</span>
      <button class="copy-btn" id="copyBtn" onclick="copyTab()">copy</button>
    </div>
    <div class="tab-canvas-wrap" id="tabWrap">
      <canvas id="tabCanvas"></canvas>
    </div>
    <div class="bar-nav">
      <div class="bar-btns">
        <button class="bar-btn" onclick="navBar(-1)">← prev</button>
        <button class="bar-btn" onclick="navBar(1)">next →</button>
      </div>
      <span class="bar-info" id="barInfo">bar 1</span>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// MIDI PARSER
// ═══════════════════════════════════════════════════
function parseMidi(buf) {
  const v = new DataView(buf);
  let p = 0;
  const u8  = () => v.getUint8(p++);
  const u16 = () => { p+=2; return v.getUint16(p-2); };
  const u32 = () => { p+=4; return v.getUint32(p-4); };
  const vl  = () => { let n=0,b; do{b=u8();n=(n<<7)|(b&0x7f);}while(b&0x80); return n; };
  const rb  = n  => { const s=p; p+=n; return new Uint8Array(buf,s,n); };

  if (String.fromCharCode(...new Uint8Array(buf,0,4)) !== 'MThd')
    throw new Error('Not a valid MIDI file');
  p=4; u32();
  const format=u16(), numTracks=u16(), division=u16();
  const tracks=[];
  let globalTempo=500000;

  for (let t=0;t<numTracks;t++) {
    const id=String.fromCharCode(...new Uint8Array(buf,p,4)); p+=4;
    const len=u32();
    if (id!=='MTrk'){p+=len;continue;}
    const end=p+len;
    let tick=0,rs=0,name=`Track ${t+1}`,tempo=globalTempo;
    const evts=[];
    while(p<end){
      const dt=vl();tick+=dt;
      let st=v.getUint8(p);
      if(st&0x80){rs=st;p++;}else{st=rs;}
      const ty=st&0xf0;
      if(st===0xff){
        const mt=u8(),ml=vl(),md=rb(ml);
        if(mt===0x03)name=String.fromCharCode(...md).replace(/\x00/g,'').trim()||name;
        if(mt===0x51){tempo=(md[0]<<16)|(md[1]<<8)|md[2];globalTempo=tempo;}
        if(mt===0x2f)break;
      }else if(st===0xf0||st===0xf7){rb(vl());}
      else if(ty===0x90||ty===0x80){
        const note=u8(),vel=u8();
        evts.push({tick,on:(ty===0x90&&vel>0),note,vel});
      }else if(ty===0xa0||ty===0xb0||ty===0xe0){u8();u8();}
      else if(ty===0xc0||ty===0xd0){u8();}
    }
    p=end;
    const notes=[],pend={};
    for(const e of evts){
      const k=`${e.note}`;
      if(e.on){pend[k]={tick:e.tick,note:e.note,vel:e.vel};}
      else if(pend[k]){
        const n=pend[k];
        notes.push({start:n.tick,end:e.tick,dur:e.tick-n.tick,note:n.note,vel:n.vel});
        delete pend[k];
      }
    }
    for(const k in pend){
      const n=pend[k];
      if(tick>n.tick)notes.push({start:n.tick,end:tick,dur:tick-n.tick,note:n.note,vel:n.vel});
    }
    tracks.push({name,notes,tempo});
  }
  return{format,division,tracks,tempo:globalTempo};
}

// ═══════════════════════════════════════════════════
// KEY DETECTION — Krumhansl-Schmuckler
// ═══════════════════════════════════════════════════
const CHR=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const ENH={'C#':'Db','D#':'Eb','F#':'Gb','G#':'Ab','A#':'Bb'};
const KK_MAJ=[6.35,2.23,3.48,2.33,4.38,4.09,2.52,5.19,2.39,3.66,2.29,2.88];
const KK_MIN=[6.33,2.68,3.52,5.38,2.60,3.53,2.54,4.75,3.98,2.69,3.34,3.17];

function detectKey(notes){
  const h=new Array(12).fill(0);
  for(const n of notes)h[n.note%12]+=Math.max(n.dur,1);
  function pearson(a,b){
    const n=a.length,ma=a.reduce((s,x)=>s+x,0)/n,mb=b.reduce((s,x)=>s+x,0)/n;
    let num=0,da=0,db=0;
    for(let i=0;i<n;i++){const ai=a[i]-ma,bi=b[i]-mb;num+=ai*bi;da+=ai*ai;db+=bi*bi;}
    return(da*db)===0?0:num/Math.sqrt(da*db);
  }
  let bestR=-Infinity,bestKey='C',bestMode='major';
  for(let r=0;r<12;r++){
    const rh=Array.from({length:12},(_,i)=>h[(i+r)%12]);
    const rm=pearson(rh,KK_MAJ),rn=pearson(rh,KK_MIN);
    if(rm>bestR){bestR=rm;bestKey=CHR[r];bestMode='major';}
    if(rn>bestR){bestR=rn;bestKey=CHR[r];bestMode='minor';}
  }
  return{key:bestKey,mode:bestMode};
}

function resolveToMajor(key,mode){
  if(mode==='major')return key;
  return CHR[(CHR.indexOf(key)+3)%12];
}

const C_KEYS=['C','C#','D','D#','E','F','F#'];
const G_KEYS=['G','G#','A','A#','B'];
const MAJ_INT=[2,2,1,2,2,2,1];
const OPEN_MIDI=[40,45,50,55,59,64];

function getCapoShape(majorKey){
  const i=CHR.indexOf(majorKey);
  if(C_KEYS.includes(majorKey))return{pattern:'C',capo:(i)%12};
  return{pattern:'G',capo:(i-7+12)%12};
}

function getMajScale(ri){
  const s=[ri];let c=ri;
  for(let i=0;i<6;i++){c=(c+MAJ_INT[i])%12;s.push(c);}
  return s;
}

function findFret(midiNote,capo){
  let best=null,bestScore=Infinity;
  for(let s=0;s<6;s++){
    for(let f=0;f<=12;f++){
      if(OPEN_MIDI[s]+capo+f===midiNote){
        const score=f*1.0+(5-s)*0.5;
        if(score<bestScore){bestScore=score;best={s,f};}
      }
    }
  }
  if(!best){
    const target=midiNote%12;
    for(let s=0;s<6;s++){
      for(let f=0;f<=12;f++){
        if((OPEN_MIDI[s]+capo+f)%12===target){
          const score=f*1.0+(5-s)*0.5;
          if(score<bestScore){bestScore=score;best={s,f};}
        }
      }
    }
  }
  return best;
}

// ═══════════════════════════════════════════════════
// TAB DATA BUILDER
// builds: grid[string][col]=fret, plus timing info
// ═══════════════════════════════════════════════════
function buildTabData(track,capo,division){
  const notes=[...track.notes].sort((a,b)=>a.start-b.start);
  if(!notes.length)return null;
  const maxTick=Math.max(...notes.map(n=>n.end));
  const Q=division/4; // 16th note quantize
  const totalCols=Math.ceil(maxTick/Q)+8;
  const ticksPerBar=division*4; // 4/4

  const grid=Array.from({length:6},()=>new Array(totalCols).fill(null));
  // map col → tick for playback
  const colTick=Array.from({length:totalCols},(_,i)=>i*Q);

  for(const n of notes){
    const col=Math.round(n.start/Q);
    if(col>=totalCols)continue;
    const pos=findFret(n.note,capo);
    if(!pos)continue;
    if(grid[pos.s][col]===null)grid[pos.s][col]=pos.f;
  }

  const colsPerBar=Math.round(ticksPerBar/Q);
  const totalBars=Math.ceil(totalCols/colsPerBar);

  return{grid,colTick,totalCols,colsPerBar,totalBars,Q,ticksPerBar,maxTick};
}

// ═══════════════════════════════════════════════════
// CANVAS TAB RENDERER
// ═══════════════════════════════════════════════════
const STRING_LABELS=['e','B','G','D','A','E']; // high→low display
const ROW_ORDER=[5,4,3,2,1,0]; // display order (e top, E bottom)

const C = {
  bg:       '#080808',
  strLine:  '#1e1e1e',
  barLine:  '#2a2a2a',
  barLineBright: '#383838',
  strLabel: '#444444',
  fretNum:  '#ffffff',
  fretDim:  '#666666',
  playhead: 'rgba(255,255,255,0.9)',
  playheadGlow: 'rgba(255,255,255,0.08)',
  highlight:'rgba(255,255,255,0.06)',
  beatDot:  '#222222',
};

const FONT_MONO = "'DM Mono', monospace";
const ROW_H = 22;      // px per string
const PAD_TOP = 18;
const PAD_BOT = 18;
const PAD_LEFT = 32;
const COL_W = 14;      // px per 16th-note column
const BARS_VISIBLE = 4; // bars shown at once

let tabData = null;
let viewBar = 0;       // first visible bar
let playheadTick = 0;
let isPlaying = false;
let playStartTime = 0;
let playStartTick = 0;
let animFrame = null;
let tempoMult = 1.0;
let midi = null;
let selTrack = 0;
let detKey = null, detMode = null;
let rawTabText = '';

function canvasH(){ return PAD_TOP + 6*ROW_H + PAD_BOT; }

function drawTab(){
  const canvas = document.getElementById('tabCanvas');
  const wrap = document.getElementById('tabWrap');
  const W = wrap.clientWidth || 860;
  const H = canvasH();
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = C.bg;
  ctx.fillRect(0,0,W,H);

  if(!tabData) return;

  const {grid,colsPerBar,totalBars,totalCols} = tabData;

  // How many cols fit in view
  const availW = W - PAD_LEFT;
  const barsVis = BARS_VISIBLE;
  const colsVis = barsVis * colsPerBar;

  const startCol = viewBar * colsPerBar;
  const endCol = Math.min(startCol + colsVis, totalCols);

  // ── String lines
  ctx.strokeStyle = C.strLine;
  ctx.lineWidth = 1;
  for(let r=0;r<6;r++){
    const y = PAD_TOP + r * ROW_H + ROW_H/2;
    ctx.beginPath();
    ctx.moveTo(PAD_LEFT, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  // ── String labels
  ctx.font = `300 10px ${FONT_MONO}`;
  ctx.textAlign = 'right';
  for(let r=0;r<6;r++){
    const si = ROW_ORDER[r];
    const y = PAD_TOP + r * ROW_H + ROW_H/2 + 3.5;
    ctx.fillStyle = C.strLabel;
    ctx.fillText(STRING_LABELS[r], PAD_LEFT - 6, y);
  }

  // ── Bar lines + bar numbers
  ctx.textAlign = 'center';
  for(let b=0; b<=barsVis; b++){
    const col = b * colsPerBar;
    const x = PAD_LEFT + col * COL_W;
    if(x > W) break;
    const absBar = viewBar + b;

    ctx.strokeStyle = b===0 ? C.barLineBright : C.barLine;
    ctx.lineWidth = b===0 ? 1.5 : 1;
    ctx.setLineDash(b===0?[]:[]);
    ctx.beginPath();
    ctx.moveTo(x, PAD_TOP - 4);
    ctx.lineTo(x, PAD_TOP + 6*ROW_H + 4);
    ctx.stroke();
    ctx.setLineDash([]);

    // bar number
    if(absBar < totalBars){
      ctx.fillStyle = '#2a2a2a';
      ctx.font = `300 9px ${FONT_MONO}`;
      ctx.fillText(absBar+1, x + colsPerBar*COL_W/2, PAD_TOP - 6);
    }
  }

  // ── Beat dots
  for(let b=0;b<barsVis;b++){
    for(let beat=0;beat<4;beat++){
      const col = b*colsPerBar + beat*(colsPerBar/4);
      const x = PAD_LEFT + col*COL_W;
      if(x>W) continue;
      ctx.fillStyle = C.beatDot;
      ctx.beginPath();
      ctx.arc(x, PAD_TOP - 10, 2, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // ── Playhead highlight (active bar background)
  const phBar = Math.floor(playheadTick / tabData.ticksPerBar);
  if(phBar >= viewBar && phBar < viewBar + barsVis){
    const bx = PAD_LEFT + (phBar - viewBar) * colsPerBar * COL_W;
    ctx.fillStyle = C.highlight;
    ctx.beginPath();
    ctx.roundRect
      ? ctx.roundRect(bx, PAD_TOP-4, colsPerBar*COL_W, 6*ROW_H+8, 4)
      : ctx.rect(bx, PAD_TOP-4, colsPerBar*COL_W, 6*ROW_H+8);
    ctx.fill();
  }

  // ── Fret numbers
  ctx.textAlign = 'center';
  for(let c=startCol; c<endCol; c++){
    const cx = PAD_LEFT + (c - startCol) * COL_W + COL_W/2;
    for(let r=0;r<6;r++){
      const si = ROW_ORDER[r];
      const val = grid[si][c];
      if(val === null) continue;
      const cy = PAD_TOP + r * ROW_H + ROW_H/2;
      const isActive = isPlaying &&
        Math.abs(tabData.colTick[c] - playheadTick) < tabData.Q * 1.5;

      const fs = val >= 10 ? 9 : 11;
      ctx.font = `${isActive?500:300} ${fs}px ${FONT_MONO}`;
      ctx.fillStyle = isActive ? '#ffffff' : C.fretNum;

      // Active note glow
      if(isActive){
        ctx.save();
        ctx.shadowColor = 'rgba(255,255,255,0.5)';
        ctx.shadowBlur = 8;
        ctx.fillText(String(val), cx, cy + 4);
        ctx.restore();
      } else {
        ctx.fillText(String(val), cx, cy + 4);
      }
    }
  }

  // ── Playhead line
  const phCol = tabData.colTick.findIndex((t,i)=>
    i+1>=tabData.colTick.length || (tabData.colTick[i]<=playheadTick && tabData.colTick[i+1]>playheadTick)
  );
  if(phCol >= startCol && phCol < endCol){
    const frac = tabData.Q > 0
      ? (playheadTick - tabData.colTick[phCol]) / tabData.Q
      : 0;
    const px = PAD_LEFT + (phCol - startCol + frac) * COL_W;
    ctx.strokeStyle = C.playhead;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = 'rgba(255,255,255,0.3)';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(px, PAD_TOP - 6);
    ctx.lineTo(px, PAD_TOP + 6*ROW_H + 6);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

// ═══════════════════════════════════════════════════
// PLAYBACK  (Web Audio API — sine tone scheduler)
// ═══════════════════════════════════════════════════
let audioCtx = null;
let scheduledNotes = [];

function midiToHz(midi){ return 440 * Math.pow(2,(midi-69)/12); }

function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function scheduleAudio(track, capo, tempo, startTick, startTime){
  const ac = getAudioCtx();
  const secPerTick = (tempo * tempoMult === 0) ? 0 : (tempo / tempoMult) / 1e6 / (midi.division);

  scheduledNotes.forEach(n => { try{n.stop();}catch(e){} });
  scheduledNotes = [];

  const notes = [...track.notes].filter(n => n.start >= startTick);

  for(const n of notes){
    const t0 = startTime + (n.start - startTick) * secPerTick;
    const dur = Math.max(0.05, n.dur * secPerTick * 0.85);
    if(t0 < ac.currentTime - 0.05) continue;
    if(t0 > ac.currentTime + 60) continue; // don't schedule too far ahead

    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sine';
    osc.frequency.value = midiToHz(n.note);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(0.12, t0 + 0.008);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
    scheduledNotes.push(osc);
  }
}

function togglePlay(){
  if(!tabData || !midi) return;
  if(isPlaying){ stopPlay(); return; }

  const ac = getAudioCtx();
  if(ac.state === 'suspended') ac.resume();

  const track = midi.tracks[selTrack];
  const majorKey = resolveToMajor(detKey, detMode);
  const {capo} = getCapoShape(majorKey);

  isPlaying = true;
  playStartTime = ac.currentTime;
  playStartTick = playheadTick;

  document.getElementById('playBtn').textContent = '■';
  document.getElementById('playBtn').classList.add('playing');

  scheduleAudio(track, capo, midi.tempo, playStartTick, playStartTime);

  function tick(){
    if(!isPlaying) return;
    const ac = getAudioCtx();
    const elapsed = ac.currentTime - playStartTime;
    const secPerTick = (midi.tempo / tempoMult) / 1e6 / midi.division;
    playheadTick = playStartTick + elapsed / secPerTick;

    if(playheadTick >= tabData.maxTick + tabData.Q*4){
      stopPlay();
      playheadTick = 0;
      updateProgress();
      drawTab();
      return;
    }

    // Auto-scroll bar view to follow playhead
    const curBar = Math.floor(playheadTick / tabData.ticksPerBar);
    if(curBar >= viewBar + BARS_VISIBLE) viewBar = curBar;
    if(curBar < viewBar) viewBar = curBar;
    viewBar = Math.max(0, Math.min(viewBar, tabData.totalBars - BARS_VISIBLE));
    updateBarInfo();

    updateProgress();
    drawTab();
    animFrame = requestAnimationFrame(tick);
  }
  animFrame = requestAnimationFrame(tick);
}

function stopPlay(){
  isPlaying = false;
  if(animFrame){ cancelAnimationFrame(animFrame); animFrame=null; }
  scheduledNotes.forEach(n=>{ try{n.stop();}catch(e){} });
  scheduledNotes=[];
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('playBtn').classList.remove('playing');
  drawTab();
}

function onTempoChange(val){
  const prev = tempoMult;
  tempoMult = val/100;
  document.getElementById('tempoVal').textContent =
    tempoMult === 1 ? '1×' : tempoMult.toFixed(2).replace(/\.?0+$/,'')+'×';

  if(isPlaying){
    // Restart scheduling at current tick with new tempo
    const ac = getAudioCtx();
    playStartTime = ac.currentTime;
    playStartTick = playheadTick;
    scheduleAudio(midi.tracks[selTrack], 0, midi.tempo, playStartTick, playStartTime);
  }
}

function updateProgress(){
  if(!tabData) return;
  const pct = Math.min(100, playheadTick / (tabData.maxTick + tabData.Q*4) * 100);
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progThumb').style.left = pct+'%';

  const secPerTick = (midi.tempo / tempoMult) / 1e6 / midi.division;
  const cur = playheadTick * secPerTick;
  const tot = (tabData.maxTick + tabData.Q*4) * secPerTick;
  document.getElementById('timeLabel').textContent = `${fmt(cur)} / ${fmt(tot)}`;
}

function fmt(s){
  const m=Math.floor(s/60), ss=Math.floor(s%60);
  return `${m}:${ss.toString().padStart(2,'0')}`;
}

// Seek on progress bar click
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('progTrack').addEventListener('click', e => {
    if(!tabData) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const frac = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    playheadTick = frac * (tabData.maxTick + tabData.Q*4);
    if(isPlaying){
      const ac = getAudioCtx();
      playStartTime = ac.currentTime;
      playStartTick = playheadTick;
      scheduleAudio(midi.tracks[selTrack], 0, midi.tempo, playStartTick, playStartTime);
    }
    const curBar = Math.floor(playheadTick / tabData.ticksPerBar);
    viewBar = Math.max(0, Math.min(curBar, tabData.totalBars - BARS_VISIBLE));
    updateBarInfo();
    updateProgress();
    drawTab();
  });

  // Click on tab canvas to seek
  document.getElementById('tabCanvas').addEventListener('click', e => {
    if(!tabData) return;
    const canvas = e.currentTarget;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const col = Math.floor((x - PAD_LEFT) / COL_W) + viewBar * tabData.colsPerBar;
    if(col >= 0 && col < tabData.totalCols){
      playheadTick = tabData.colTick[col];
      if(isPlaying){
        const ac = getAudioCtx();
        playStartTime = ac.currentTime;
        playStartTick = playheadTick;
        scheduleAudio(midi.tracks[selTrack], 0, midi.tempo, playStartTick, playStartTime);
      }
      updateProgress();
      drawTab();
    }
  });
});

// ═══════════════════════════════════════════════════
// BAR NAVIGATION
// ═══════════════════════════════════════════════════
function navBar(dir){
  if(!tabData) return;
  viewBar = Math.max(0, Math.min(viewBar + dir, tabData.totalBars - BARS_VISIBLE));
  updateBarInfo();
  drawTab();
}

function updateBarInfo(){
  if(!tabData) return;
  const last = Math.min(viewBar + BARS_VISIBLE, tabData.totalBars);
  document.getElementById('barInfo').textContent =
    `bar ${viewBar+1} – ${last} / ${tabData.totalBars}`;
}

// ═══════════════════════════════════════════════════
// FILE HANDLING
// ═══════════════════════════════════════════════════
const drop = document.getElementById('drop');
document.getElementById('fileIn').onchange = e => e.target.files[0] && load(e.target.files[0]);
drop.addEventListener('dragover', e=>{e.preventDefault();drop.classList.add('over');});
drop.addEventListener('dragleave',()=>drop.classList.remove('over'));
drop.addEventListener('drop',e=>{
  e.preventDefault();drop.classList.remove('over');
  const f=e.dataTransfer.files[0];if(f)load(f);
});

function load(file){
  const rd = new FileReader();
  rd.onload = e => {
    try {
      if(isPlaying) stopPlay();
      midi = parseMidi(e.target.result);

      const allNotes = midi.tracks.flatMap(t=>t.notes);
      const det = detectKey(allNotes);
      detKey = det.key; detMode = det.mode;

      const majorKey = resolveToMajor(detKey, detMode);
      const {pattern, capo} = getCapoShape(majorKey);
      const bpm = Math.round(60000000 / midi.tempo);

      // Drop zone
      drop.classList.add('loaded');
      drop.querySelector('.drop-hint').innerHTML =
        `<strong>${file.name}</strong>`;

      // Meta
      const keyStr = detKey + (ENH[detKey]?' / '+ENH[detKey]:'') + ' ' + detMode;
      document.getElementById('metaRow').innerHTML = `
        <span class="tag">${bpm} bpm</span>
        <span class="tag hi">key: ${keyStr}</span>
        <span class="tag">${capo===0?'no capo':'capo '+capo}</span>
        <span class="tag">${pattern} shape</span>
      `;

      // Track pills
      const pills = document.getElementById('pillsRow');
      pills.innerHTML = '';
      let firstIdx = -1;
      midi.tracks.forEach((tr,i)=>{
        if(!tr.notes.length) return;
        if(firstIdx<0) firstIdx=i;
        const pill = document.createElement('button');
        pill.className = 'pill'+(i===(firstIdx===selTrack?selTrack:firstIdx)?' active':'');
        pill.textContent = tr.name;
        pill.onclick = ()=>{
          selTrack=i;
          document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
          pill.classList.add('active');
          buildAndDraw();
        };
        pills.appendChild(pill);
      });
      if(firstIdx>=0) selTrack=firstIdx;

      // Show result
      const res = document.getElementById('result');
      res.classList.remove('hidden');
      res.classList.remove('fade');
      void res.offsetWidth;
      res.classList.add('fade');

      buildAndDraw();
    } catch(err) {
      drop.querySelector('.drop-hint').innerHTML =
        `<strong style="color:#c05050">error: ${err.message}</strong>`;
    }
  };
  rd.readAsArrayBuffer(file);
}

function buildAndDraw(){
  if(!midi) return;
  const track = midi.tracks[selTrack];
  if(!track) return;
  const majorKey = resolveToMajor(detKey, detMode);
  const {pattern, capo} = getCapoShape(majorKey);

  playheadTick = 0;
  viewBar = 0;
  tabData = buildTabData(track, capo, midi.division);
  if(!tabData) return;

  buildRawTabText(track, capo);
  updateProgress();
  updateBarInfo();

  // Resize canvas to wrap width then draw
  setTimeout(()=>{ drawTab(); }, 0);
}

function buildRawTabText(track, capo){
  const bpm = Math.round(60000000/midi.tempo);
  const majorKey = resolveToMajor(detKey,detMode);
  const {pattern,capo:cp}=getCapoShape(majorKey);
  const keyStr=detKey+' '+detMode+(ENH[detKey]?' / '+ENH[detKey]+' '+detMode:'');
  rawTabText=`; key   ${keyStr}\n; capo  ${cp===0?'none':'fret '+cp}\n; shape ${pattern} major\n; bpm   ${bpm}\n\n`;

  const {grid,colsPerBar,totalCols}=tabData;
  const COLS=colsPerBar*4;
  const lbl=['e','B','G','D','A','E'];
  const ro=[5,4,3,2,1,0];
  let col=0;
  while(col<totalCols){
    const end=Math.min(col+COLS,totalCols);
    for(let ri=0;ri<6;ri++){
      const si=ro[ri];
      let line=lbl[ri]+' ';
      for(let c=col;c<end;c++){
        const v=grid[si][c];
        line+=(v===null?'-':String(v));
      }
      rawTabText+=line+'\n';
    }
    rawTabText+='\n';
    col=end;
  }
}

function copyTab(){
  if(!rawTabText)return;
  navigator.clipboard.writeText(rawTabText).then(()=>{
    const b=document.getElementById('copyBtn');
    b.textContent='copied'; b.classList.add('ok');
    setTimeout(()=>{b.textContent='copy';b.classList.remove('ok');},1800);
  });
}

// Redraw on resize
window.addEventListener('resize', ()=>{ if(tabData) drawTab(); });
</script>
